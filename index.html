<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Booty i Niszczyciele — prototyp HTML</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b100d;
      --panel: #111711;
      --panel2: #0a0f0b;
      --line: #39463b;
      --text: #d9e3d3;
      --muted: #95a18f;
      --green: #6fe25d;
      --blue: #4ab6ff;
      --yellow: #d9aa2a;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(190px, 21vw, 255px);
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 5px;
      padding: 5px;
    }

    #gameWrap {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #16221f;
      position: relative;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
      background: #172522;
    }

    aside {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr 1fr 1fr auto auto;
      gap: 6px;
    }

    .panel {
      min-height: 0;
      background: linear-gradient(180deg, #121812, #070b08);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 7px;
      overflow: hidden;
    }

    .panelTitle {
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .statusOn { color: var(--green); }
    .statusOff { color: #6d756b; }

    .scopeCanvas, #shipView {
      width: 100%;
      height: calc(100% - 20px);
      display: block;
      background: #050806;
      border: 1px solid #253027;
      border-radius: 7px;
    }

    .miniControls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      min-height: 72px;
    }

    .controlCard {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      text-align: center;
    }

    .bigVal {
      color: var(--green);
      font-size: 17px;
      margin-top: 4px;
    }

    .tinyButton {
      background: #151d16;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--green);
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      padding: 2px 6px;
      cursor: pointer;
    }

    .tinyButton:active { transform: translateY(1px); }

    .weaponControls {
      min-height: 78px;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    #console {
      grid-column: 1 / 3;
      min-height: 66px;
      max-height: 92px;
      overflow: hidden;
      background: linear-gradient(180deg, #121812, #070b08);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px 10px;
      font-family: "Courier New", Courier, monospace;
      white-space: pre-wrap;
      line-height: 1.2;
      font-size: clamp(11px, 1.1vw, 13px);
      color: var(--text);
    }

    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 58vh 1fr auto;
        overflow: auto;
        height: auto;
        min-height: 100vh;
      }
      aside { grid-template-columns: 1fr 1fr; grid-template-rows: 170px 170px auto; }
      #console { grid-column: 1; }
      .miniControls, .weaponControls { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <main id="gameWrap"><canvas id="game"></canvas></main>

  <aside>
    <section class="panel">
      <div class="panelTitle"><span>SONAR</span><button id="sonarButton" class="tinyButton">WŁĄCZ</button><span id="sonarStatus" class="statusOff">WYŁ.</span></div>
      <canvas id="sonar" class="scopeCanvas"></canvas>
    </section>

    <section class="panel">
      <div class="panelTitle"><span>RADAR</span><span class="statusOn">WŁ.</span></div>
      <canvas id="radar" class="scopeCanvas"></canvas>
    </section>

    <section class="panel">
      <div class="panelTitle"><span>NISZCZYCIEL / FLETCHER</span><span id="windShort">WIATR</span></div>
      <canvas id="shipView"></canvas>
    </section>

    <section class="miniControls">
      <div class="controlCard">PRĘDKOŚĆ<div id="speedRead" class="bigVal">STOP</div></div>
      <div class="controlCard">STER<div id="rudderRead" class="bigVal">0°</div></div>
      <div class="controlCard">KURS<div id="courseRead" class="bigVal">000°</div></div>
    </section>

    <section class="weaponControls" id="weaponRead"></section>
  </aside>

  <div id="console"></div>

  <script>
    const game = document.getElementById("game");
    const ctx = game.getContext("2d");
    const sonarCanvas = document.getElementById("sonar");
    const sonarCtx = sonarCanvas.getContext("2d");
    const radarCanvas = document.getElementById("radar");
    const radarCtx = radarCanvas.getContext("2d");
    const shipView = document.getElementById("shipView");
    const shipCtx = shipView.getContext("2d");

    const consolePanel = document.getElementById("console");
    const sonarButton = document.getElementById("sonarButton");
    const sonarStatus = document.getElementById("sonarStatus");
    const speedRead = document.getElementById("speedRead");
    const rudderRead = document.getElementById("rudderRead");
    const courseRead = document.getElementById("courseRead");
    const weaponRead = document.getElementById("weaponRead");
    const windShort = document.getElementById("windShort");

    const keysPressed = new Set();
    const keysHandled = new Set();

    const WORLD_W = 22000;
    const WORLD_H = 22000;
    let METERS_PER_PIXEL = 42;

    const speedOrders = [
      { name: "STOP", value: 0 },
      { name: "1/3", value: 4.8 },
      { name: "2/3", value: 8.9 },
      { name: "CAŁA", value: 13.5 },
      { name: "FLANKA", value: 18.5 }
    ];

    const ship = {
      x: WORLD_W / 2,
      y: WORLD_H * 0.62,
      heading: degToRad(0),
      speed: 0,
      targetSpeedIndex: 0,
      rudder: 0,
      maxRudder: 30,
      orderedCourse: null,
      autopilot: false,
      lengthM: 114.8
    };

    const camera = { x: 0, y: 0, anchorX: 0.5, anchorY: 0.5 };

    const sonar = { on: false, minRange: 300, range: 2500, pingCooldown: 0, contactToneCooldown: 0 };
    const radar = { range: 9500 };
    const guns = {
      mode: "MANUAL",
      bearing: degToRad(0),
      range: 4500,
      minRange: 1500,
      maxRange: 9500,
      muzzleVelocity: 792,
      reload: 0,
      reloadTime: 1.0
    };

    const weather = {
      t: 0,
      rain: 0.65,
      wave: 0.72,
      windDir: degToRad(305),
      windSpeed: 14.5
    };

    let target = randomTarget();
    let targetRespawnTimer = null;
    let courseInput = "";
    let lastMessage = "Gotowy. Sonar wyłączony. Cel testowy rozstawiony losowo.";
    let audioCtx = null;
    let lastTime = performance.now();

    const shells = [];
    const splashes = [];
    const muzzleFlashes = [];
    const rainDrops = Array.from({ length: 360 }, () => ({ x: Math.random(), y: Math.random(), s: 0.55 + Math.random() * 1.1 }));

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = Math.max(10, Math.floor(rect.width * dpr));
      const h = Math.max(10, Math.floor(rect.height * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      return dpr;
    }

    function resizeAll() {
      resizeCanvas(game); resizeCanvas(sonarCanvas); resizeCanvas(radarCanvas); resizeCanvas(shipView);
    }
    window.addEventListener("resize", resizeAll);
    resizeAll();

    sonarButton.addEventListener("click", () => toggleSonar());

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      keysPressed.add(key);
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) event.preventDefault();
      if (/^[0-9]$/.test(event.key)) courseInput = (courseInput + event.key).slice(-3);

      if (event.key === "Enter" && courseInput.length > 0) {
        const course = Number(courseInput);
        if (Number.isFinite(course)) {
          ship.orderedCourse = ((course % 360) + 360) % 360;
          ship.autopilot = true;
          lastMessage = `Rozkaz zmiany kursu na ${ship.orderedCourse.toString().padStart(3, "0")}°.`;
        }
        courseInput = "";
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      keysPressed.delete(key);
      keysHandled.delete(key);
    });

    function wasPressedOnce(key) {
      if (keysPressed.has(key) && !keysHandled.has(key)) {
        keysHandled.add(key);
        return true;
      }
      return false;
    }

    function degToRad(deg) { return (deg - 90) * Math.PI / 180; }
    function radToCourse(rad) { return (((rad * 180 / Math.PI) + 90) % 360 + 360) % 360; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function angleDiffRad(a, b) { return Math.atan2(Math.sin(a - b), Math.cos(a - b)); }
    function angleDiffDeg(target, current) { return ((target - current + 540) % 360) - 180; }
    function angleToPoint(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

    function randomTarget() {
      const d = 3100 + Math.random() * 3200;
      const a = Math.random() * Math.PI * 2;
      return {
        x: ship.x + Math.cos(a) * d,
        y: ship.y + Math.sin(a) * d,
        radius: 95,
        alive: true
      };
    }

    function updateMapScale() {
      const minVisibleRadiusPx = Math.min(
        game.width * camera.anchorX,
        game.width * (1 - camera.anchorX),
        game.height * camera.anchorY,
        game.height * (1 - camera.anchorY)
      ) * 0.90;
      METERS_PER_PIXEL = radar.range / Math.max(120, minVisibleRadiusPx);
    }

    function worldToScreen(p) {
      return { x: (p.x - camera.x) / METERS_PER_PIXEL, y: (p.y - camera.y) / METERS_PER_PIXEL };
    }

    function updateCamera() {
      updateMapScale();
      camera.x = ship.x - game.width * METERS_PER_PIXEL * camera.anchorX;
      camera.y = ship.y - game.height * METERS_PER_PIXEL * camera.anchorY;
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq, duration, type = "sine", volume = 0.08, endFreq = null) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration * 0.85);
      filter.type = "bandpass";
      filter.frequency.value = 1200;
      filter.Q.value = 7;
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(filter).connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration + 0.03);
    }

    function sonarPing(contact) {
      tone(1550, 0.22, "sine", 0.13, 920);
      setTimeout(() => tone(920, 0.12, "sine", 0.045, 760), 230);
      if (contact) {
        setTimeout(() => tone(620, 0.18, "triangle", 0.12, 520), 430);
        setTimeout(() => tone(700, 0.12, "triangle", 0.07, 570), 660);
      }
    }

    function toggleSonar() {
      ensureAudio();
      sonar.on = !sonar.on;
      sonar.pingCooldown = 0;
      lastMessage = sonar.on ? "Sonar aktywny. Ping i nasłuch uruchomione." : "Sonar wyłączony.";
    }

    function updateOrders(dt) {
      if (wasPressedOnce("arrowup") || wasPressedOnce("w")) ship.targetSpeedIndex = clamp(ship.targetSpeedIndex + 1, 0, speedOrders.length - 1);
      if (wasPressedOnce("arrowdown") || wasPressedOnce("s")) ship.targetSpeedIndex = clamp(ship.targetSpeedIndex - 1, 0, speedOrders.length - 1);

      if (wasPressedOnce("arrowleft") || wasPressedOnce("a")) { ship.rudder = clamp(ship.rudder - 5, -ship.maxRudder, ship.maxRudder); ship.autopilot = false; ship.orderedCourse = null; }
      if (wasPressedOnce("arrowright") || wasPressedOnce("d")) { ship.rudder = clamp(ship.rudder + 5, -ship.maxRudder, ship.maxRudder); ship.autopilot = false; ship.orderedCourse = null; }
      if (wasPressedOnce("x")) ship.targetSpeedIndex = 0;
      if (wasPressedOnce("z")) ship.rudder = 0;

      if (wasPressedOnce("p")) toggleSonar();

      if (wasPressedOnce("f")) { guns.mode = "AUTO"; lastMessage = "Tryb automatyczny artylerii: tylko kierunek, bez automatycznej nastawy zasięgu."; }
      if (wasPressedOnce("g")) { guns.mode = "MANUAL"; lastMessage = "Tryb manualny artylerii."; }
      if (wasPressedOnce(",") || wasPressedOnce("<")) guns.bearing -= degToRad(5) - degToRad(0);
      if (wasPressedOnce(".") || wasPressedOnce(">")) guns.bearing += degToRad(5) - degToRad(0);
      if (wasPressedOnce("o")) guns.range = clamp(guns.range + 250, guns.minRange, guns.maxRange);
      if (wasPressedOnce("l")) guns.range = clamp(guns.range - 250, guns.minRange, guns.maxRange);
      if (wasPressedOnce(" ")) fireGun();

      if (guns.mode === "AUTO" && target.alive) {
        const desired = angleToPoint(ship, target);
        guns.bearing += clamp(angleDiffRad(desired, guns.bearing), -0.7 * dt, 0.7 * dt);
        // Celowo NIE ustawiamy automatycznie zasięgu.
      }
    }

    function updateAutopilot() {
      if (!ship.autopilot || ship.orderedCourse === null) return;
      const current = radToCourse(ship.heading);
      const diff = angleDiffDeg(ship.orderedCourse, current);
      ship.rudder = clamp(diff * 0.16, -15, 15);
      if (Math.abs(diff) < 1.2) {
        ship.rudder = 0;
        ship.heading = degToRad(ship.orderedCourse);
        ship.autopilot = false;
      }
    }

    function updatePhysics(dt) {
      const targetSpeed = speedOrders[ship.targetSpeedIndex].value;
      const accel = targetSpeed > ship.speed ? 0.55 : 0.82;
      ship.speed += clamp(targetSpeed - ship.speed, -accel * dt, accel * dt);

      updateAutopilot();

      const rudderFactor = ship.rudder / ship.maxRudder;
      const speedFactor = ship.speed / speedOrders[speedOrders.length - 1].value;
      const turnRate = rudderFactor * speedFactor * 0.105;
      ship.heading += turnRate * dt;

      // Wiatr: boczny znosi kurs i lekko wpływa na prędkość. Efekt jest mały, bo niszczyciel ma dużą bezwładność.
      const windAngleToShip = angleDiffRad(weather.windDir, ship.heading);
      const headWind = Math.cos(windAngleToShip) * weather.windSpeed;
      const crossWind = Math.sin(windAngleToShip) * weather.windSpeed;
      const windSpeedEffect = -headWind * 0.018;
      const leeway = crossWind * 0.016;
      const yawDrift = crossWind * 0.00018;

      ship.heading += yawDrift * dt;
      const actualSpeed = Math.max(0, ship.speed + windSpeedEffect);
      ship.x += Math.cos(ship.heading) * actualSpeed * dt;
      ship.y += Math.sin(ship.heading) * actualSpeed * dt;
      ship.x += Math.cos(weather.windDir) * leeway * dt;
      ship.y += Math.sin(weather.windDir) * leeway * dt;

      ship.x = (ship.x + WORLD_W) % WORLD_W;
      ship.y = (ship.y + WORLD_H) % WORLD_H;
    }

    function updateSonar(dt) {
      sonar.pingCooldown -= dt;
      sonar.contactToneCooldown -= dt;
      if (!sonar.on) return;
      const contact = target.alive && dist(ship, target) <= sonar.range && dist(ship, target) >= sonar.minRange;
      if (sonar.pingCooldown <= 0) {
        sonarPing(contact);
        sonar.pingCooldown = 2.4;
      }
      if (contact && sonar.contactToneCooldown <= 0) {
        tone(520, 0.05, "square", 0.018);
        sonar.contactToneCooldown = 0.55;
      }
    }

    function ballisticFlightTime(rangeM) {
      // Uproszczenie: pocisk 5-calowy, v0 ok. 792 m/s; niska elewacja dla gry.
      const v = guns.muzzleVelocity;
      const g = 9.81;
      const safeRange = clamp(rangeM, 100, 11000);
      const ratio = clamp((safeRange * g) / (v * v), 0.01, 0.95);
      const angle = Math.asin(ratio) / 2;
      return (2 * v * Math.sin(angle)) / g;
    }

    function updateProjectiles(dt) {
      guns.reload = Math.max(0, guns.reload - dt);
      for (let i = shells.length - 1; i >= 0; i--) {
        const s = shells[i];
        s.t += dt;
        const p = clamp(s.t / s.flightTime, 0, 1);
        s.x = s.startX + (s.endX - s.startX) * p;
        s.y = s.startY + (s.endY - s.startY) * p;
        s.z = Math.sin(p * Math.PI) * 260;
        if (p >= 1) {
          const hit = target.alive && Math.hypot(s.endX - target.x, s.endY - target.y) < target.radius + 90;
          if (hit) {
            target.alive = false;
            targetRespawnTimer = 10;
            lastMessage = "Trafienie! Nowy cel za 10 sekund.";
          } else lastMessage = "Upadek pocisku w wodę.";
          splashes.push({ x: s.endX, y: s.endY, t: 0, maxT: hit ? 1.4 : 1.0, hit });
          shells.splice(i, 1);
        }
      }
      for (let i = splashes.length - 1; i >= 0; i--) { splashes[i].t += dt; if (splashes[i].t > splashes[i].maxT) splashes.splice(i, 1); }
      for (let i = muzzleFlashes.length - 1; i >= 0; i--) { muzzleFlashes[i].t += dt; if (muzzleFlashes[i].t > 0.18) muzzleFlashes.splice(i, 1); }
    }

    function respawnTarget(dt) {
      if (target.alive) return;
      targetRespawnTimer -= dt;
      if (targetRespawnTimer <= 0) {
        target = randomTarget();
        targetRespawnTimer = null;
        lastMessage = "Nowy cel testowy na mapie.";
      }
    }

    function getAimPoint() { return { x: ship.x + Math.cos(guns.bearing) * guns.range, y: ship.y + Math.sin(guns.bearing) * guns.range }; }
    function getGunMuzzle() { return { x: ship.x + Math.cos(ship.heading) * 24, y: ship.y + Math.sin(ship.heading) * 24 }; }

    function fireGun() {
      if (guns.reload > 0) { lastMessage = "Działa przeładowują."; return; }
      const aim = getAimPoint();
      const start = getGunMuzzle();
      const flightTime = ballisticFlightTime(guns.range);
      shells.push({ startX: start.x, startY: start.y, endX: aim.x, endY: aim.y, x: start.x, y: start.y, z: 0, t: 0, flightTime });
      muzzleFlashes.push({ x: start.x, y: start.y, angle: guns.bearing, t: 0 });
      guns.reload = guns.reloadTime;
      lastMessage = `Ogień. Czas lotu: ${flightTime.toFixed(1)} s.`;
      ensureAudio(); tone(110, 0.16, "sawtooth", 0.045);
    }

    function drawOcean() {
      const w = game.width, h = game.height;
      const grd = ctx.createRadialGradient(w * 0.52, h * 0.44, 40, w * 0.52, h * 0.44, Math.max(w, h));
      grd.addColorStop(0, "#263b36");
      grd.addColorStop(0.55, "#1b2c28");
      grd.addColorStop(1, "#111b18");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);

      const gridStepM = 1000;
      ctx.save();
      ctx.strokeStyle = "rgba(220,230,215,.14)";
      ctx.lineWidth = 1;
      const startX = Math.floor(camera.x / gridStepM) * gridStepM;
      const endX = camera.x + w * METERS_PER_PIXEL + gridStepM;
      const startY = Math.floor(camera.y / gridStepM) * gridStepM;
      const endY = camera.y + h * METERS_PER_PIXEL + gridStepM;
      for (let wx = startX; wx <= endX; wx += gridStepM) {
        const sx = (wx - camera.x) / METERS_PER_PIXEL;
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, h); ctx.stroke();
        ctx.fillStyle = "rgba(220,230,215,.65)"; ctx.font = "12px Courier New"; ctx.fillText(`${Math.round((wx - ship.x)/1000)}`, sx + 4, 16);
      }
      for (let wy = startY; wy <= endY; wy += gridStepM) {
        const sy = (wy - camera.y) / METERS_PER_PIXEL;
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(w, sy); ctx.stroke();
      }
      ctx.restore();

      drawWaves();
      drawRain();
    }

    function drawWaves() {
      const w = game.width, h = game.height;
      ctx.save();
      ctx.strokeStyle = `rgba(205,220,205,${0.07 + weather.wave * 0.06})`;
      ctx.lineWidth = 1;
      const waveStep = 80;
      const drift = weather.t * weather.windSpeed * 2;
      for (let y = -40; y < h + 40; y += waveStep) {
        ctx.beginPath();
        for (let x = -40; x < w + 40; x += 16) {
          const wx = x + Math.cos(weather.windDir) * drift;
          const yy = y + Math.sin((x + drift) * 0.018) * 7 + Math.sin((x + weather.t * 30) * 0.041) * 2;
          if (x === -40) ctx.moveTo(wx, yy); else ctx.lineTo(wx, yy);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRain() {
      if (weather.rain <= 0) return;
      const w = game.width, h = game.height;
      ctx.save();
      ctx.strokeStyle = `rgba(210,225,220,${0.10 + weather.rain * 0.16})`;
      ctx.lineWidth = 1;
      const slantX = Math.cos(weather.windDir) * 18;
      const slantY = Math.sin(weather.windDir) * 18 + 12;
      for (const r of rainDrops) {
        const x = ((r.x * w + weather.t * weather.windSpeed * 25 * r.s) % (w + 80)) - 40;
        const y = ((r.y * h + weather.t * 230 * r.s) % (h + 80)) - 40;
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + slantX * r.s, y + slantY * r.s); ctx.stroke();
      }
      ctx.restore();
    }

    function drawRangeCircles() {
      const s = worldToScreen(ship);
      function circle(range, color, dash = []) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash(dash);
        ctx.beginPath(); ctx.arc(s.x, s.y, range / METERS_PER_PIXEL, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
      circle(sonar.minRange, "rgba(111,226,93,.65)", [6, 4]);
      circle(sonar.range, "rgba(111,226,93,.75)", [9, 5]);
      circle(radar.range, "rgba(74,182,255,.72)", [9, 5]);
      circle(guns.minRange, "rgba(217,170,42,.75)", [8, 5]);
      circle(guns.maxRange, "rgba(217,170,42,.90)", [10, 5]);
    }

    function drawArrowWorld(origin, angle, lengthM, label, color, dashed=false) {
      const s = worldToScreen(origin);
      const length = lengthM / METERS_PER_PIXEL;
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(angle);
      ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1.6;
      if (dashed) ctx.setLineDash([7, 6]);
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(length, 0); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(length, 0); ctx.lineTo(length-10, -5); ctx.lineTo(length-10, 5); ctx.closePath(); ctx.fill();
      ctx.rotate(-angle); ctx.font = "12px system-ui"; ctx.fillText(label, Math.cos(angle)*(length+8), Math.sin(angle)*(length+8));
      ctx.restore();
    }

    function drawTacticalOverlays() {
      drawRangeCircles();
      if (Math.abs(ship.rudder) > 1 && ship.speed > 1) {
        const predicted = ship.heading + (ship.rudder / ship.maxRudder) * (ship.speed / 18.5) * 0.42;
        drawArrowWorld(ship, predicted, 1050, "przewidywany", "rgba(225,235,225,.75)", true);
      }
      if (ship.orderedCourse !== null) drawArrowWorld(ship, degToRad(ship.orderedCourse), 1300, `kurs ${String(Math.round(ship.orderedCourse)).padStart(3,"0")}`, "rgba(225,235,225,.75)", true);
      drawArrowWorld(ship, ship.heading, 900, "kurs", "rgba(225,235,225,.85)");

      const aim = getAimPoint();
      const ss = worldToScreen(ship), aa = worldToScreen(aim);
      ctx.save();
      ctx.strokeStyle = "rgba(217,170,42,.85)"; ctx.lineWidth = 1.8; ctx.setLineDash([7, 7]);
      ctx.beginPath(); ctx.moveTo(ss.x, ss.y); ctx.lineTo(aa.x, aa.y); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(aa.x, aa.y, 13, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(aa.x-20, aa.y); ctx.lineTo(aa.x+20, aa.y); ctx.moveTo(aa.x, aa.y-20); ctx.lineTo(aa.x, aa.y+20); ctx.stroke();
      ctx.restore();
    }

    function drawTarget() {
      if (!target.alive) return;
      const p = worldToScreen(target);
      ctx.save(); ctx.translate(p.x, p.y);
      ctx.fillStyle = "#aeb8aa"; ctx.strokeStyle = "#0b100d"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0, 0, 9, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#d9e3d3"; ctx.font = "12px system-ui"; ctx.fillText(`${Math.round(dist(ship,target))} m`, 14, -8);
      ctx.restore();
    }

    function drawDestroyer(context, x, y, heading, scale = 1, wake=true) {
      context.save(); context.translate(x, y); context.rotate(heading); context.scale(scale, scale);
      context.lineWidth = 1.4 / scale; context.strokeStyle = "#0b100d"; context.fillStyle = "#8d978b";
      context.beginPath(); context.moveTo(32,0); context.lineTo(20,-5.5); context.lineTo(-27,-6.5); context.lineTo(-36,-3); context.lineTo(-40,0); context.lineTo(-36,3); context.lineTo(-27,6.5); context.lineTo(20,5.5); context.closePath(); context.fill(); context.stroke();
      context.fillStyle = "#c1c8bd"; context.fillRect(-6,-4,14,8); context.fillStyle = "#6f7a70"; context.fillRect(-21,-3,9,6);
      drawTurret(context, 22, 0, guns.bearing - heading, scale); drawTurret(context, 10, 0, guns.bearing - heading, scale); drawTurret(context, -28, 0, guns.bearing - heading, scale);
      if (wake) { context.strokeStyle = "rgba(220,230,215,.35)"; context.lineWidth = 1 / scale; context.beginPath(); context.moveTo(-39,-2); context.lineTo(-75,-10); context.moveTo(-39,2); context.lineTo(-75,10); context.stroke(); }
      context.restore();
    }

    function drawTurret(context, x, y, angle, scale) {
      context.save(); context.translate(x, y); context.rotate(angle);
      context.fillStyle = "#d7ddd1"; context.strokeStyle = "#0b100d"; context.lineWidth = 1 / scale;
      context.beginPath(); context.arc(0,0,3.2,0,Math.PI*2); context.fill(); context.stroke();
      context.beginPath(); context.moveTo(0,0); context.lineTo(11,0); context.stroke(); context.restore();
    }

    function drawEffects() {
      for (const flash of muzzleFlashes) {
        const p = 1 - flash.t / 0.18; const pos = worldToScreen(flash);
        ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(flash.angle); ctx.fillStyle = `rgba(245,230,165,${p})`;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20*p,-6*p); ctx.lineTo(29*p,0); ctx.lineTo(20*p,6*p); ctx.closePath(); ctx.fill(); ctx.restore();
      }
      for (const s of shells) {
        const p = worldToScreen(s); ctx.save(); ctx.fillStyle = "#f5e6a5";
        ctx.beginPath(); ctx.arc(p.x, p.y - s.z / METERS_PER_PIXEL * 0.75, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
      }
      for (const sp of splashes) {
        const pp = worldToScreen(sp); const t = sp.t / sp.maxT;
        ctx.save(); ctx.globalAlpha = 1 - t; ctx.strokeStyle = sp.hit ? "#f3e8bd" : "#d8e8d5"; ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.arc(pp.x, pp.y, 6 + t * 26, 0, Math.PI*2); ctx.stroke(); ctx.restore();
      }
    }

    function drawCircularScope(context, type) {
      const w = context.canvas.width, h = context.canvas.height, size = Math.min(w,h), cx = w/2, cy = h/2, r = size*0.42;
      const color = type === "sonar" ? "rgba(111,226,93,.85)" : "rgba(74,182,255,.85)";
      const range = type === "sonar" ? sonar.range : radar.range;
      context.clearRect(0,0,w,h); context.save(); context.fillStyle = "#050806"; context.fillRect(0,0,w,h);
      context.strokeStyle = color; context.lineWidth = 1;
      for (let rr = r/4; rr <= r; rr += r/4) { context.globalAlpha = .45; context.beginPath(); context.arc(cx,cy,rr,0,Math.PI*2); context.stroke(); }
      context.globalAlpha = .75; context.beginPath(); context.moveTo(cx-r,cy); context.lineTo(cx+r,cy); context.moveTo(cx,cy-r); context.lineTo(cx,cy+r); context.stroke();
      context.globalAlpha = 1; context.beginPath(); context.arc(cx,cy,r,0,Math.PI*2); context.stroke();
      context.fillStyle = "#d9e3d3"; context.beginPath(); context.arc(cx,cy,4,0,Math.PI*2); context.fill();
      if (target.alive && (type !== "sonar" || sonar.on)) {
        const dx = target.x - ship.x, dy = target.y - ship.y, d = Math.hypot(dx,dy);
        if (d <= range && (type !== "sonar" || d >= sonar.minRange)) {
          context.fillStyle = type === "sonar" ? "#6fe25d" : "#4ab6ff";
          context.beginPath(); context.arc(cx + dx/range*r, cy + dy/range*r, type === "sonar" ? 3 : 4, 0, Math.PI*2); context.fill();
        }
      }
      context.fillStyle = type === "sonar" ? "#6fe25d" : "#4ab6ff"; context.font = "12px Courier New"; context.fillText(`${range} m`, 8, h - 10);
      context.restore();
    }

    function drawShipPanel() {
      const w = shipView.width, h = shipView.height;
      shipCtx.clearRect(0,0,w,h); shipCtx.fillStyle = "#050806"; shipCtx.fillRect(0,0,w,h);
      shipCtx.strokeStyle = "rgba(217,227,211,.16)"; shipCtx.beginPath(); shipCtx.moveTo(w/2,0); shipCtx.lineTo(w/2,h); shipCtx.moveTo(0,h/2); shipCtx.lineTo(w,h/2); shipCtx.stroke();
      drawDestroyer(shipCtx, w/2, h/2, ship.heading, Math.min(w,h)/72, false);
      shipCtx.fillStyle = "#95a18f"; shipCtx.font = "12px Courier New"; shipCtx.fillText(`WIATR ${radToCourse(weather.windDir).toFixed(0)}° / ${weather.windSpeed.toFixed(1)} m/s`, 8, h-10);
    }

    function drawMain() {
      resizeAll(); updateCamera();
      drawOcean(); drawTacticalOverlays(); drawTarget(); drawEffects();
      const sp = worldToScreen(ship); drawDestroyer(ctx, sp.x, sp.y, ship.heading, 0.34, true);
      drawCircularScope(sonarCtx,"sonar"); drawCircularScope(radarCtx,"radar"); drawShipPanel();
    }

    function updateUI() {
      const course = radToCourse(ship.heading);
      const order = speedOrders[ship.targetSpeedIndex];
      const rudderSide = ship.rudder < -0.5 ? "L" : ship.rudder > 0.5 ? "P" : "";
      const aim = getAimPoint();
      const miss = target.alive ? Math.round(Math.hypot(aim.x-target.x, aim.y-target.y)) : "---";
      const flightTime = ballisticFlightTime(guns.range);
      const respawn = target.alive ? "---" : `${Math.max(0, targetRespawnTimer || 0).toFixed(1)} s`;

      sonarStatus.textContent = sonar.on ? "WŁ." : "WYŁ.";
      sonarStatus.className = sonar.on ? "statusOn" : "statusOff";
      speedRead.textContent = order.name;
      rudderRead.textContent = `${Math.abs(ship.rudder).toFixed(0)}° ${rudderSide}`;
      courseRead.textContent = `${course.toFixed(0).padStart(3,"0")}°`;
      windShort.textContent = `${radToCourse(weather.windDir).toFixed(0)}° ${weather.windSpeed.toFixed(0)}m/s`;
      weaponRead.innerHTML = `UZBROJENIE<br>TRYB: <span style="color:var(--yellow)">${guns.mode}</span><br>KĄT: <span style="color:var(--yellow)">${radToCourse(guns.bearing).toFixed(0).padStart(3,"0")}°</span><br>ZASIĘG: <span style="color:var(--yellow)">${Math.round(guns.range)} m</span><br>CZAS LOTU: <span style="color:var(--yellow)">${flightTime.toFixed(1)} s</span>`;

      consolePanel.textContent =
`SONAR ${sonar.on ? "WŁ." : "WYŁ."}  |  RADAR 9500 m  |  DZIAŁA ${guns.minRange}-${guns.maxRange} m  |  BŁĄD CEL.: ${miss} m  |  NOWY CEL: ${respawn}\n` +
`WIATR: ${radToCourse(weather.windDir).toFixed(0)}° / ${weather.windSpeed.toFixed(1)} m/s  |  WPISYWANIE KURSU: ${courseInput || "---"}  |  ${lastMessage}\n` +
`W/S prędkość, A/D ster +/-5°, Z ster zero, 000-359+Enter kurs, P sonar, F/G auto/manual, < > obrót dział, O/L zasięg, Spacja strzał`;
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      weather.t += dt;
      updateOrders(dt); updatePhysics(dt); updateSonar(dt); updateProjectiles(dt); respawnTarget(dt);
      drawMain(); updateUI();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
