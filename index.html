<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Booty i Niszczyciele — prototyp HTML</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0b100d; --panel: #111711; --panel2: #0a0f0b; --line: #39463b;
      --text: #d9e3d3; --muted: #95a18f; --sonar: #6fe25d; --radar: #4ab6ff;
      --guns: #d9aa2a; --danger: #d77752;
    }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh; overflow: hidden;
      display: grid; grid-template-columns: minmax(0, 1fr) clamp(185px, 20vw, 245px);
      grid-template-rows: minmax(0, 1fr) auto; gap: 5px; padding: 5px;
    }
    #gameWrap { min-width: 0; min-height: 0; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #16221f; position: relative; }
    #game { width: 100%; height: 100%; display: block; background: #172522; cursor: grab; }
    #game.dragging { cursor: grabbing; }
    aside { min-width: 0; min-height: 0; display: grid; grid-template-rows: 1fr 1fr 1fr auto auto; gap: 5px; }
    .panel { min-height: 0; background: linear-gradient(180deg, #121812, #070b08); border: 1px solid var(--line); border-radius: 9px; padding: 6px; overflow: hidden; }
    .panelTitle { font-family: "Courier New", Courier, monospace; font-size: 12px; color: var(--text); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 4px; }
    .statusOn { color: var(--sonar); } .statusOff { color: #6d756b; }
    .scopeCanvas, #shipView { width: 100%; height: calc(100% - 20px); display: block; background: #050806; border: 1px solid #253027; border-radius: 7px; }
    .miniControls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; min-height: 70px; }
    .controlCard { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 4px; font-family: "Courier New", Courier, monospace; font-size: 11px; text-align: center; }
    .bigVal { color: var(--sonar); font-size: 15px; margin-top: 4px; }
    .tinyButton { background: #151d16; border: 1px solid var(--line); border-radius: 5px; color: var(--sonar); font-family: "Courier New", Courier, monospace; font-size: 10px; padding: 2px 5px; cursor: pointer; }
    .tinyButton:active { transform: translateY(1px); }
    .weaponControls { min-height: 78px; background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 7px; font-family: "Courier New", Courier, monospace; font-size: 11px; color: var(--muted); line-height: 1.2; }
    #console { grid-column: 1 / 3; min-height: 74px; max-height: 104px; overflow: hidden; background: linear-gradient(180deg, #121812, #070b08); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font-family: "Courier New", Courier, monospace; white-space: pre-wrap; line-height: 1.2; font-size: clamp(11px, 1.08vw, 14px); color: var(--text); }
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; grid-template-rows: 58vh auto auto; overflow: auto; height: auto; min-height: 100vh; }
      aside { grid-template-columns: 1fr 1fr; grid-template-rows: 170px 170px auto; }
      #console { grid-column: 1; } .miniControls, .weaponControls { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <main id="gameWrap"><canvas id="game"></canvas></main>
  <aside>
    <section class="panel"><div class="panelTitle"><span>SONAR</span><button id="sonarButton" class="tinyButton">WŁĄCZ</button><span id="sonarStatus" class="statusOff">WYŁ.</span></div><canvas id="sonar" class="scopeCanvas"></canvas></section>
    <section class="panel"><div class="panelTitle"><span>RADAR</span><span class="statusOn">WŁ.</span></div><canvas id="radar" class="scopeCanvas"></canvas></section>
    <section class="panel"><div class="panelTitle"><span>NISZCZYCIEL / FLETCHER</span><span id="windShort">WIATR</span></div><canvas id="shipView"></canvas></section>
    <section class="miniControls"><div class="controlCard">PRĘDKOŚĆ<div id="speedRead" class="bigVal">STOP</div></div><div class="controlCard">STER<div id="rudderRead" class="bigVal">0°</div></div><div class="controlCard">KURS<div id="courseRead" class="bigVal">000°</div></div></section>
    <section class="weaponControls" id="weaponRead"></section>
  </aside>
  <div id="console"></div>

  <script>
    const game = document.getElementById("game"), ctx = game.getContext("2d");
    const sonarCanvas = document.getElementById("sonar"), sonarCtx = sonarCanvas.getContext("2d");
    const radarCanvas = document.getElementById("radar"), radarCtx = radarCanvas.getContext("2d");
    const shipView = document.getElementById("shipView"), shipCtx = shipView.getContext("2d");
    const consolePanel = document.getElementById("console"), sonarButton = document.getElementById("sonarButton"), sonarStatus = document.getElementById("sonarStatus");
    const speedRead = document.getElementById("speedRead"), rudderRead = document.getElementById("rudderRead"), courseRead = document.getElementById("courseRead"), weaponRead = document.getElementById("weaponRead"), windShort = document.getElementById("windShort");

    const keysPressed = new Set(), keysHandled = new Set();
    const WORLD_W = 30000, WORLD_H = 30000;
    let baseMetersPerPixel = 42, METERS_PER_PIXEL = 42, zoom = 1;
    const MIN_ZOOM = 0.42, MAX_ZOOM = 9.0;

    const speedOrders = [
      { name: "STOP", value: 0 }, { name: "1/3", value: 4.8 }, { name: "2/3", value: 8.9 }, { name: "CAŁA", value: 13.5 }, { name: "FLANKA", value: 18.5 }
    ];

    const ship = { x: WORLD_W/2, y: WORLD_H*0.62, heading: degToRad(0), speed: 0, targetSpeedIndex: 0, rudder: 0, maxRudder: 30, orderedCourse: null, autopilot: false, lengthM: 114.8 };
    const camera = { x: 0, y: 0, anchorX: 0.5, anchorY: 0.5, manualOffsetX: 0, manualOffsetY: 0 };

    const sonar = { on: false, minRange: 300, range: 2500, pingCooldown: 0, contactToneCooldown: 0 };
    const radar = { range: 9500 };
    const guns = { mode: "MANUAL", bearing: degToRad(0), relativeBearing: 0, range: 4500, minRange: 1200, maxRange: 16460, muzzleVelocity: 792, reload: 0, reloadTime: 1.0 };
    const weather = { t: 0, rain: 0.62, wave: 0.42, windDir: degToRad(305), windSpeed: 14.5 };

    let target = randomTarget(), targetRespawnTimer = null, courseInput = "", angleInput = "", inputMode = "COURSE";
    let lastMessage = "Gotowy. Tryb wpisywania: KURS. Sonar wyłączony.";
    let audioCtx = null, lastTime = performance.now();
    const shells = [], splashes = [], muzzleFlashes = [], wake = [];
    const rainDrops = Array.from({ length: 420 }, () => ({ x: Math.random(), y: Math.random(), s: 0.55 + Math.random()*1.25 }));
    const drag = { active: false, lastX: 0, lastY: 0 };

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const w = Math.max(10, Math.floor(rect.width*dpr)), h = Math.max(10, Math.floor(rect.height*dpr));
      if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    }
    function resizeAll() { resizeCanvas(game); resizeCanvas(sonarCanvas); resizeCanvas(radarCanvas); resizeCanvas(shipView); }
    window.addEventListener("resize", resizeAll); resizeAll();
    sonarButton.addEventListener("click", () => toggleSonar());

    game.addEventListener("wheel", e => {
      e.preventDefault();
      const factor = Math.exp(-e.deltaY * 0.0012);
      zoom = clamp(zoom * factor, MIN_ZOOM, MAX_ZOOM);
    }, { passive: false });
    game.addEventListener("mousedown", e => { if (e.button !== 0) return; drag.active = true; drag.lastX = e.clientX; drag.lastY = e.clientY; game.classList.add("dragging"); });
    window.addEventListener("mousemove", e => {
      if (!drag.active) return;
      const dx = e.clientX - drag.lastX, dy = e.clientY - drag.lastY;
      drag.lastX = e.clientX; drag.lastY = e.clientY;
      camera.manualOffsetX -= dx * METERS_PER_PIXEL;
      camera.manualOffsetY -= dy * METERS_PER_PIXEL;
    });
    window.addEventListener("mouseup", () => { drag.active = false; game.classList.remove("dragging"); });
    game.addEventListener("dblclick", () => { camera.manualOffsetX = 0; camera.manualOffsetY = 0; lastMessage = "Kamera wycentrowana na niszczycielu."; });

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase(); keysPressed.add(key);
      if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(key)) event.preventDefault();
      if (/^[0-9]$/.test(event.key)) {
        if (inputMode === "AIM") angleInput = (angleInput + event.key).slice(-3);
        else courseInput = (courseInput + event.key).slice(-3);
      }
      if (event.key === "Enter") {
        if (inputMode === "AIM" && angleInput.length > 0) {
          const angle = Number(angleInput);
          if (Number.isFinite(angle)) {
            guns.bearing = degToRad(((angle % 360)+360)%360);
            guns.relativeBearing = angleDiffRad(guns.bearing, ship.heading);
            lastMessage = `Kąt celowania ustawiony na ${String(Math.round(radToCourse(guns.bearing))).padStart(3,"0")}°.`;
          }
          angleInput = "";
        } else if (inputMode === "COURSE" && courseInput.length > 0) {
          const course = Number(courseInput);
          if (Number.isFinite(course)) {
            ship.orderedCourse = ((course % 360)+360)%360;
            ship.autopilot = true;
            lastMessage = `Rozkaz zmiany kursu na ${String(ship.orderedCourse).padStart(3,"0")}°.`;
          }
          courseInput = "";
        }
      }
      if (event.key === "Escape") { courseInput = ""; angleInput = ""; ship.autopilot = false; ship.orderedCourse = null; }
    });
    window.addEventListener("keyup", event => { const key = event.key.toLowerCase(); keysPressed.delete(key); keysHandled.delete(key); });

    function wasPressedOnce(key) { if (keysPressed.has(key) && !keysHandled.has(key)) { keysHandled.add(key); return true; } return false; }
    function degToRad(deg) { return (deg - 90) * Math.PI / 180; }
    function radToCourse(rad) { return (((rad * 180 / Math.PI) + 90) % 360 + 360) % 360; }
    function clamp(v,min,max) { return Math.max(min, Math.min(max, v)); }
    function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
    function angleDiffRad(a,b) { return Math.atan2(Math.sin(a-b), Math.cos(a-b)); }
    function angleDiffDeg(target,current) { return ((target-current+540)%360)-180; }
    function angleToPoint(a,b) { return Math.atan2(b.y-a.y, b.x-a.x); }

    function randomTarget() {
      const d = 3200 + Math.random()*5200, a = Math.random()*Math.PI*2;
      return { x: (ship.x + Math.cos(a)*d + WORLD_W)%WORLD_W, y: (ship.y + Math.sin(a)*d + WORLD_H)%WORLD_H, radius: 95, alive: true };
    }
    function updateMapScale() {
      const minVisibleRadiusPx = Math.min(game.width, game.height) * 0.43;
      baseMetersPerPixel = radar.range / Math.max(120, minVisibleRadiusPx);
      METERS_PER_PIXEL = baseMetersPerPixel / zoom;
    }
    function worldToScreen(p) { return { x: (p.x-camera.x)/METERS_PER_PIXEL, y: (p.y-camera.y)/METERS_PER_PIXEL }; }
    function updateCamera() {
      updateMapScale();
      camera.x = ship.x - game.width*METERS_PER_PIXEL*camera.anchorX + camera.manualOffsetX;
      camera.y = ship.y - game.height*METERS_PER_PIXEL*camera.anchorY + camera.manualOffsetY;
    }

    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === "suspended") audioCtx.resume(); }
    function tone(freq,duration,type="sine",volume=0.08,endFreq=null) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
      osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration*0.85);
      filter.type = "bandpass"; filter.frequency.value = 1200; filter.Q.value = 8;
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime+0.012); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+duration);
      osc.connect(filter).connect(gain).connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+duration+0.03);
    }
    function noise(duration, volume, filterFreq=280) {
      if (!audioCtx) return;
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate*duration, audioCtx.sampleRate), data = buffer.getChannelData(0);
      for (let i=0;i<data.length;i++) data[i] = Math.random()*2-1;
      const src = audioCtx.createBufferSource(), gain = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
      src.buffer = buffer; filter.type = "lowpass"; filter.frequency.value = filterFreq;
      gain.gain.setValueAtTime(volume, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+duration);
      src.connect(filter).connect(gain).connect(audioCtx.destination); src.start(); src.stop(audioCtx.currentTime+duration);
    }
    function sonarPing(contact) { tone(1700,0.24,"sine",0.16,850); setTimeout(()=>tone(980,0.10,"sine",0.06,720),250); if (contact) { setTimeout(()=>tone(620,0.18,"triangle",0.14,520),430); setTimeout(()=>tone(740,0.13,"triangle",0.09,560),660); } }
    function toggleSonar() { ensureAudio(); sonar.on = !sonar.on; sonar.pingCooldown = 0; lastMessage = sonar.on ? "Sonar aktywny. Ping i nasłuch uruchomione." : "Sonar wyłączony."; }

    function updateOrders(dt) {
      if (wasPressedOnce("arrowup") || wasPressedOnce("w")) ship.targetSpeedIndex = clamp(ship.targetSpeedIndex+1, 0, speedOrders.length-1);
      if (wasPressedOnce("arrowdown") || wasPressedOnce("s")) ship.targetSpeedIndex = clamp(ship.targetSpeedIndex-1, 0, speedOrders.length-1);
      if (wasPressedOnce("arrowleft") || wasPressedOnce("a")) { ship.rudder = clamp(ship.rudder-5, -ship.maxRudder, ship.maxRudder); ship.autopilot=false; ship.orderedCourse=null; }
      if (wasPressedOnce("arrowright") || wasPressedOnce("d")) { ship.rudder = clamp(ship.rudder+5, -ship.maxRudder, ship.maxRudder); ship.autopilot=false; ship.orderedCourse=null; }
      if (wasPressedOnce("x")) ship.targetSpeedIndex = 0;
      if (wasPressedOnce("z")) ship.rudder = 0;
      if (wasPressedOnce("p")) toggleSonar();
      if (wasPressedOnce("g")) {
        if (guns.mode !== "MANUAL") { guns.mode = "MANUAL"; lastMessage = "Tryb manualny artylerii."; }
        else { inputMode = inputMode === "AIM" ? "COURSE" : "AIM"; angleInput = ""; courseInput = ""; lastMessage = inputMode === "AIM" ? "Tryb wpisywania: KĄT CELOWANIA." : "Tryb wpisywania: KURS OKRĘTU."; }
      }
      if (wasPressedOnce("f")) { guns.mode = "AUTO"; inputMode = "COURSE"; lastMessage = "Tryb automatyczny: działa śledzą kierunek celu, zasięg nadal ręczny."; }

      const gunTurnRate = 10 * Math.PI / 180;
      let turn = 0;
      if (keysPressed.has(",") || keysPressed.has("<")) turn -= gunTurnRate * dt;
      if (keysPressed.has(".") || keysPressed.has(">")) turn += gunTurnRate * dt;
      if (turn !== 0) { guns.mode = "MANUAL"; guns.bearing += turn; guns.relativeBearing = angleDiffRad(guns.bearing, ship.heading); }

      const rangeRate = 520; // metry na sekundę: płynna zmiana nastawy zasięgu
      if (keysPressed.has("o")) guns.range = clamp(guns.range + rangeRate*dt, guns.minRange, guns.maxRange);
      if (keysPressed.has("l")) guns.range = clamp(guns.range - rangeRate*dt, guns.minRange, guns.maxRange);
      if (wasPressedOnce(" ")) fireGun();

      if (guns.mode === "AUTO" && target.alive) {
        const desired = angleToPoint(ship,target);
        guns.bearing += clamp(angleDiffRad(desired,guns.bearing), -0.7*dt, 0.7*dt);
        guns.relativeBearing = angleDiffRad(guns.bearing, ship.heading);
      }
    }
    function updateAutopilot() {
      if (!ship.autopilot || ship.orderedCourse === null) return;
      const diff = angleDiffDeg(ship.orderedCourse, radToCourse(ship.heading));
      ship.rudder = clamp(diff*0.16, -15, 15);
      if (Math.abs(diff) < 1.2) { ship.rudder = 0; ship.heading = degToRad(ship.orderedCourse); ship.autopilot = false; }
    }
    function updatePhysics(dt) {
      const previousHeading = ship.heading;
      const targetSpeed = speedOrders[ship.targetSpeedIndex].value, accel = targetSpeed > ship.speed ? 0.55 : 0.82;
      ship.speed += clamp(targetSpeed-ship.speed, -accel*dt, accel*dt);
      updateAutopilot();
      ship.heading += (ship.rudder/ship.maxRudder) * (ship.speed/18.5) * 0.105 * dt;
      const windAngleToShip = angleDiffRad(weather.windDir, ship.heading), headWind = Math.cos(windAngleToShip)*weather.windSpeed, crossWind = Math.sin(windAngleToShip)*weather.windSpeed;
      const windSpeedEffect = -headWind*0.010 - weather.wave*0.10;
      const leeway = crossWind * (0.010 + weather.wave*0.004);
      const yawDrift = crossWind * (0.000055 + weather.wave*0.000025);
      const waveYaw = Math.sin(weather.t*0.9 + ship.x*0.00018) * weather.wave * 0.00045;
      ship.heading += (yawDrift + waveYaw)*dt;

      if (guns.mode === "MANUAL") guns.bearing += ship.heading - previousHeading;
      guns.relativeBearing = angleDiffRad(guns.bearing, ship.heading);

      const actualSpeed = Math.max(0, ship.speed + windSpeedEffect);
      ship.x += Math.cos(ship.heading)*actualSpeed*dt + Math.cos(weather.windDir)*leeway*dt;
      ship.y += Math.sin(ship.heading)*actualSpeed*dt + Math.sin(weather.windDir)*leeway*dt;
      ship.x = (ship.x + WORLD_W) % WORLD_W; ship.y = (ship.y + WORLD_H) % WORLD_H;

      wake.push({ x: ship.x - Math.cos(ship.heading)*45, y: ship.y - Math.sin(ship.heading)*45, t: 0, heading: ship.heading });
      while (wake.length > 260) wake.shift();
      for (const w of wake) w.t += dt;
      while (wake.length && wake[0].t > 35) wake.shift();
    }
    function updateSonar(dt) {
      sonar.pingCooldown -= dt; sonar.contactToneCooldown -= dt;
      if (!sonar.on) return;
      const contact = target.alive && dist(ship,target) <= sonar.range && dist(ship,target) >= sonar.minRange;
      if (sonar.pingCooldown <= 0) { sonarPing(contact); sonar.pingCooldown = 2.4; }
      if (contact && sonar.contactToneCooldown <= 0) { tone(520,0.07,"square",0.04,480); sonar.contactToneCooldown = 0.55; }
    }
    function ballisticFlightTime(rangeM) {
      const v = guns.muzzleVelocity, g = 9.81, safeRange = clamp(rangeM, 100, guns.maxRange);
      const ratio = clamp((safeRange*g)/(v*v), 0.01, 0.95);
      const angle = Math.asin(ratio)/2;
      return (2*v*Math.sin(angle))/g;
    }
    function updateProjectiles(dt) {
      guns.reload = Math.max(0, guns.reload-dt);
      for (let i=shells.length-1;i>=0;i--) {
        const s = shells[i]; s.t += dt; const p = clamp(s.t/s.flightTime, 0, 1);
        s.x = s.startX+(s.endX-s.startX)*p; s.y = s.startY+(s.endY-s.startY)*p; s.z = Math.sin(p*Math.PI)*260;
        if (p >= 1) {
          const hit = target.alive && Math.hypot(s.endX-target.x, s.endY-target.y) < target.radius + 90;
          splashes.push({ x:s.endX, y:s.endY, t:0, maxT: hit ? 1.4 : 1.0, hit });
          if (hit) { target.alive=false; targetRespawnTimer=10; lastMessage="Trafienie! Nowy cel za 10 sekund."; ensureAudio(); noise(0.35,0.12,190); tone(85,0.24,"sawtooth",0.08,55); }
          else { lastMessage="Plusk. Pocisk spadł do wody."; ensureAudio(); noise(0.28,0.07,520); }
          shells.splice(i,1);
        }
      }
      for (let i=splashes.length-1;i>=0;i--) { splashes[i].t += dt; if (splashes[i].t > splashes[i].maxT) splashes.splice(i,1); }
      for (let i=muzzleFlashes.length-1;i>=0;i--) { muzzleFlashes[i].t += dt; if (muzzleFlashes[i].t > 0.18) muzzleFlashes.splice(i,1); }
    }
    function respawnTarget(dt) { if (target.alive) return; targetRespawnTimer -= dt; if (targetRespawnTimer <= 0) { target = randomTarget(); targetRespawnTimer = null; lastMessage = "Nowy cel testowy na mapie."; } }
    function getAimPoint() { return { x: ship.x + Math.cos(guns.bearing)*guns.range, y: ship.y + Math.sin(guns.bearing)*guns.range }; }
    function getGunMuzzle() { return { x: ship.x + Math.cos(ship.heading)*24, y: ship.y + Math.sin(ship.heading)*24 }; }
    function fireGun() {
      if (guns.reload > 0) { lastMessage = "Działa przeładowują."; return; }
      const aim = getAimPoint(), start = getGunMuzzle(), flightTime = ballisticFlightTime(guns.range);
      shells.push({ startX:start.x, startY:start.y, endX:aim.x, endY:aim.y, x:start.x, y:start.y, z:0, t:0, flightTime });
      muzzleFlashes.push({ x:start.x, y:start.y, angle:guns.bearing, t:0 });
      guns.reload = guns.reloadTime; lastMessage = `Ogień. Czas lotu: ${flightTime.toFixed(1)} s.`;
      ensureAudio(); tone(72,0.17,"sawtooth",0.18,48); noise(0.22,0.08,160);
    }

    function drawOcean() {
      const w = game.width, h = game.height;
      const grd = ctx.createRadialGradient(w*.52,h*.44,40,w*.52,h*.44,Math.max(w,h));
      grd.addColorStop(0,"#263b36"); grd.addColorStop(.55,"#1b2c28"); grd.addColorStop(1,"#111b18");
      ctx.fillStyle = grd; ctx.fillRect(0,0,w,h);
      const gridStepM = 1000;
      ctx.save(); ctx.strokeStyle="rgba(220,230,215,.14)"; ctx.lineWidth=1;
      const startX = Math.floor(camera.x/gridStepM)*gridStepM, endX = camera.x+w*METERS_PER_PIXEL+gridStepM;
      const startY = Math.floor(camera.y/gridStepM)*gridStepM, endY = camera.y+h*METERS_PER_PIXEL+gridStepM;
      for (let wx=startX; wx<=endX; wx+=gridStepM) { const sx=(wx-camera.x)/METERS_PER_PIXEL; ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,h); ctx.stroke(); }
      for (let wy=startY; wy<=endY; wy+=gridStepM) { const sy=(wy-camera.y)/METERS_PER_PIXEL; ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(w,sy); ctx.stroke(); }
      ctx.restore(); drawWake(); drawWaves(); drawRain();
    }
    function drawWake() {
      ctx.save();
      for (const w of wake) {
        const p = worldToScreen(w), a = clamp(1 - w.t/35, 0, 1);
        ctx.strokeStyle = `rgba(225,235,225,${0.22*a})`; ctx.lineWidth = Math.max(1, 5*a);
        ctx.beginPath(); ctx.ellipse(p.x, p.y, (16 + w.t*2.2)/METERS_PER_PIXEL*18, (3 + w.t*.25)/METERS_PER_PIXEL*18, w.heading, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
    function drawWaves() {
      const w = game.width, h = game.height;
      ctx.save(); ctx.strokeStyle = `rgba(205,220,205,${0.035 + weather.wave*0.032})`; ctx.lineWidth=1;
      const waveStep = 46, worldPhase = camera.x*.00045 + camera.y*.00025, timePhase = weather.t*weather.windSpeed*.22, amp = 1.4 + weather.wave*1.7, windShift = (weather.t*weather.windSpeed*5)%waveStep;
      for (let y=-waveStep; y<h+waveStep; y+=waveStep) {
        ctx.beginPath();
        for (let x=-28; x<w+32; x+=16) {
          const yy = y + windShift + Math.sin(x*.015+worldPhase+timePhase)*amp + Math.sin(x*.037-timePhase*.6)*.7;
          if (x===-28) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }
      ctx.restore();
    }
    function drawRain() {
      if (weather.rain <= 0) return;
      const w=game.width, h=game.height; ctx.save(); ctx.strokeStyle = `rgba(210,225,220,${0.10+weather.rain*.16})`; ctx.lineWidth=1;
      const slantX = Math.cos(weather.windDir)*18, slantY = Math.sin(weather.windDir)*18+12;
      for (const r of rainDrops) { const x=((r.x*w + weather.t*weather.windSpeed*25*r.s)%(w+80))-40, y=((r.y*h + weather.t*230*r.s)%(h+80))-40; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+slantX*r.s, y+slantY*r.s); ctx.stroke(); }
      ctx.restore();
    }
    function drawRangeCircles() {
      const s = worldToScreen(ship);
      const circle = (range,color,dash=[]) => { ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash); ctx.beginPath(); ctx.arc(s.x,s.y,range/METERS_PER_PIXEL,0,Math.PI*2); ctx.stroke(); ctx.restore(); };
      circle(sonar.minRange,"rgba(111,226,93,.55)",[6,4]); circle(sonar.range,"rgba(111,226,93,.82)",[9,5]); circle(radar.range,"rgba(74,182,255,.82)",[9,5]); circle(guns.minRange,"rgba(217,170,42,.72)",[8,5]); circle(guns.maxRange,"rgba(217,170,42,.92)",[10,5]);
    }
    function drawArrowWorld(origin,angle,lengthM,label,color,dashed=false) {
      const s=worldToScreen(origin), length=lengthM/METERS_PER_PIXEL;
      ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(angle); ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=1.6; if (dashed) ctx.setLineDash([7,6]);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(length,0); ctx.stroke(); ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(length,0); ctx.lineTo(length-10,-5); ctx.lineTo(length-10,5); ctx.closePath(); ctx.fill();
      ctx.rotate(-angle); ctx.font="14px system-ui"; ctx.fillText(label, Math.cos(angle)*(length+8), Math.sin(angle)*(length+8)); ctx.restore();
    }
    function drawTacticalOverlays() {
      drawRangeCircles();
      if (Math.abs(ship.rudder)>1 && ship.speed>1) drawArrowWorld(ship, ship.heading+(ship.rudder/ship.maxRudder)*(ship.speed/18.5)*.42, 1050, "przewidywany", "rgba(225,235,225,.75)", true);
      if (ship.orderedCourse !== null) drawArrowWorld(ship, degToRad(ship.orderedCourse), 1300, `kurs ${String(Math.round(ship.orderedCourse)).padStart(3,"0")}`, "rgba(225,235,225,.75)", true);
      drawArrowWorld(ship, ship.heading, 900, "kurs", "rgba(225,235,225,.85)");
      const aim=getAimPoint(), ss=worldToScreen(ship), aa=worldToScreen(aim);
      ctx.save(); ctx.strokeStyle="rgba(217,170,42,.85)"; ctx.lineWidth=1.8; ctx.setLineDash([7,7]); ctx.beginPath(); ctx.moveTo(ss.x,ss.y); ctx.lineTo(aa.x,aa.y); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(aa.x,aa.y,13,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(aa.x-20,aa.y); ctx.lineTo(aa.x+20,aa.y); ctx.moveTo(aa.x,aa.y-20); ctx.lineTo(aa.x,aa.y+20); ctx.stroke(); ctx.restore();
    }
    function drawTarget() {
      if (!target.alive) return; const p=worldToScreen(target);
      ctx.save(); ctx.translate(p.x,p.y); ctx.fillStyle="#aeb8aa"; ctx.strokeStyle="#0b100d"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.ellipse(0,0,9,5,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.fillStyle="#d9e3d3"; ctx.font="14px system-ui"; ctx.fillText(`${Math.round(dist(ship,target))} m`,14,-8); ctx.restore();
    }
    function drawDestroyer(context,x,y,heading,scale=1,wakeOn=true) {
      context.save(); context.translate(x,y); context.rotate(heading); context.scale(scale,scale); context.lineWidth=1.4/scale; context.strokeStyle="#0b100d"; context.fillStyle="#8d978b";
      context.beginPath(); context.moveTo(32,0); context.lineTo(20,-5.5); context.lineTo(-27,-6.5); context.lineTo(-36,-3); context.lineTo(-40,0); context.lineTo(-36,3); context.lineTo(-27,6.5); context.lineTo(20,5.5); context.closePath(); context.fill(); context.stroke();
      context.fillStyle="#c1c8bd"; context.fillRect(-6,-4,14,8); context.fillStyle="#6f7a70"; context.fillRect(-21,-3,9,6);
      drawTurret(context,22,0,guns.bearing-heading,scale); drawTurret(context,10,0,guns.bearing-heading,scale); drawTurret(context,-28,0,guns.bearing-heading,scale);
      if (wakeOn) { context.strokeStyle="rgba(220,230,215,.35)"; context.lineWidth=1/scale; context.beginPath(); context.moveTo(-39,-2); context.lineTo(-75,-10); context.moveTo(-39,2); context.lineTo(-75,10); context.stroke(); }
      context.restore();
    }
    function drawTurret(context,x,y,angle,scale) { context.save(); context.translate(x,y); context.rotate(angle); context.fillStyle="#d7ddd1"; context.strokeStyle="#0b100d"; context.lineWidth=1/scale; context.beginPath(); context.arc(0,0,3.2,0,Math.PI*2); context.fill(); context.stroke(); context.beginPath(); context.moveTo(0,0); context.lineTo(11,0); context.stroke(); context.restore(); }
    function drawEffects() {
      for (const flash of muzzleFlashes) { const p=1-flash.t/.18, pos=worldToScreen(flash); ctx.save(); ctx.translate(pos.x,pos.y); ctx.rotate(flash.angle); ctx.fillStyle=`rgba(245,230,165,${p})`; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20*p,-6*p); ctx.lineTo(29*p,0); ctx.lineTo(20*p,6*p); ctx.closePath(); ctx.fill(); ctx.restore(); }
      for (const s of shells) { const p=worldToScreen(s); ctx.save(); ctx.fillStyle="#f5e6a5"; ctx.beginPath(); ctx.arc(p.x,p.y - s.z/METERS_PER_PIXEL*.75,3,0,Math.PI*2); ctx.fill(); ctx.restore(); }
      for (const sp of splashes) { const pp=worldToScreen(sp), t=sp.t/sp.maxT; ctx.save(); ctx.globalAlpha=1-t; ctx.strokeStyle=sp.hit?"#f3e8bd":"#d8e8d5"; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(pp.x,pp.y,6+t*26,0,Math.PI*2); ctx.stroke(); ctx.restore(); }
    }
    function drawCircularScope(context,type) {
      const w=context.canvas.width,h=context.canvas.height,size=Math.min(w,h),cx=w/2,cy=h/2,r=size*.42, color=type==="sonar"?"rgba(111,226,93,.85)":"rgba(74,182,255,.85)", range=type==="sonar"?sonar.range:radar.range;
      context.clearRect(0,0,w,h); context.save(); context.fillStyle="#050806"; context.fillRect(0,0,w,h); context.strokeStyle=color; context.lineWidth=1;
      for (let rr=r/4; rr<=r; rr+=r/4) { context.globalAlpha=.45; context.beginPath(); context.arc(cx,cy,rr,0,Math.PI*2); context.stroke(); }
      context.globalAlpha=.75; context.beginPath(); context.moveTo(cx-r,cy); context.lineTo(cx+r,cy); context.moveTo(cx,cy-r); context.lineTo(cx,cy+r); context.stroke(); context.globalAlpha=1; context.beginPath(); context.arc(cx,cy,r,0,Math.PI*2); context.stroke(); context.fillStyle="#d9e3d3"; context.beginPath(); context.arc(cx,cy,4,0,Math.PI*2); context.fill();
      if (target.alive && (type!=="sonar" || sonar.on)) { const dx=target.x-ship.x, dy=target.y-ship.y, d=Math.hypot(dx,dy); if (d<=range && (type!=="sonar" || d>=sonar.minRange)) { context.fillStyle=type==="sonar"?"#6fe25d":"#4ab6ff"; context.beginPath(); context.arc(cx+dx/range*r,cy+dy/range*r,type==="sonar"?3:4,0,Math.PI*2); context.fill(); } }
      context.fillStyle=type==="sonar"?"#6fe25d":"#4ab6ff"; context.font="12px Courier New"; context.fillText(`${range} m`,8,h-10); context.restore();
    }
    function drawShipPanel() { const w=shipView.width,h=shipView.height; shipCtx.clearRect(0,0,w,h); shipCtx.fillStyle="#050806"; shipCtx.fillRect(0,0,w,h); shipCtx.strokeStyle="rgba(217,227,211,.16)"; shipCtx.beginPath(); shipCtx.moveTo(w/2,0); shipCtx.lineTo(w/2,h); shipCtx.moveTo(0,h/2); shipCtx.lineTo(w,h/2); shipCtx.stroke(); drawDestroyer(shipCtx,w/2,h/2,ship.heading,Math.min(w,h)/72,false); shipCtx.fillStyle="#95a18f"; shipCtx.font="12px Courier New"; shipCtx.fillText(`WIATR ${radToCourse(weather.windDir).toFixed(0)}° / ${weather.windSpeed.toFixed(1)} m/s`,8,h-10); }
    function drawMain() { resizeAll(); updateCamera(); drawOcean(); drawTacticalOverlays(); drawTarget(); drawEffects(); const sp=worldToScreen(ship); drawDestroyer(ctx,sp.x,sp.y,ship.heading,0.16,true); drawCircularScope(sonarCtx,"sonar"); drawCircularScope(radarCtx,"radar"); drawShipPanel(); }
    function updateUI() {
      const course=radToCourse(ship.heading), order=speedOrders[ship.targetSpeedIndex], rudderSide=ship.rudder<-0.5?"L":ship.rudder>0.5?"P":"", aim=getAimPoint();
      const miss=target.alive?Math.round(Math.hypot(aim.x-target.x,aim.y-target.y)):"---", flightTime=ballisticFlightTime(guns.range), respawn=target.alive?"---":`${Math.max(0,targetRespawnTimer||0).toFixed(1)} s`;
      sonarStatus.textContent=sonar.on?"WŁ.":"WYŁ."; sonarStatus.className=sonar.on?"statusOn":"statusOff"; sonarButton.textContent=sonar.on?"WYŁĄCZ":"WŁĄCZ";
      speedRead.textContent=order.name; rudderRead.textContent=`${Math.abs(ship.rudder).toFixed(0)}° ${rudderSide}`; courseRead.textContent=`${course.toFixed(0).padStart(3,"0")}°`; windShort.textContent=`${radToCourse(weather.windDir).toFixed(0)}° ${weather.windSpeed.toFixed(0)}m/s`;
      weaponRead.innerHTML=`UZBROJENIE<br>TRYB: <span style="color:var(--guns)">${guns.mode}</span><br>WPIS: <span style="color:${inputMode==='AIM'?'var(--guns)':'var(--sonar)'}">${inputMode==='AIM'?'KĄT':'KURS'}</span><br>KĄT: <span style="color:var(--guns)">${radToCourse(guns.bearing).toFixed(0).padStart(3,"0")}°</span><br>ZASIĘG: <span style="color:var(--guns)">${Math.round(guns.range)} m</span><br>CZAS LOTU: <span style="color:var(--guns)">${flightTime.toFixed(1)} s</span>`;
      consolePanel.textContent =
`TRYB WPISYWANIA: ${inputMode==='AIM'?'KĄT CELOWANIA':'KURS OKRĘTU'}  |  WPIS: ${inputMode==='AIM'?(angleInput||'---'):(courseInput||'---')}  |  SONAR ${sonar.on?'WŁ.':'WYŁ.'}  |  RADAR ${radar.range} m  |  DZIAŁA ${guns.minRange}-${guns.maxRange} m\n`+
`BŁĄD CEL.: ${miss} m  |  NOWY CEL: ${respawn}  |  ZOOM: ${zoom.toFixed(2)}x  |  SKALA: 1px=${METERS_PER_PIXEL.toFixed(1)}m  |  ${lastMessage}\n`+
`Mysz: kółko=zoom, LPM=przesuń mapę, 2x klik=centruj. W/S prędkość, A/D ster, Z zero, G przełącza wpis KURS/KĄT, F auto, < > płynny obrót, O/L płynny zasięg, Spacja strzał`;
    }
    function loop(now) { const dt=Math.min((now-lastTime)/1000,.05); lastTime=now; weather.t+=dt; updateOrders(dt); updatePhysics(dt); updateSonar(dt); updateProjectiles(dt); respawnTarget(dt); drawMain(); updateUI(); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>
