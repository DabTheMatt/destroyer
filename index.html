<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U-Booty i Niszczyciele — ASCII</title>
  <style>
    :root {
      --bg: #000;
      --fg: #f2f2f2;
      --muted: #a8a8a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Courier New", Courier, monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #screen {
      flex: 1;
      white-space: pre;
      line-height: 1;
      font-size: 15px;
      padding: 8px 10px;
      overflow: hidden;
      user-select: none;
    }

    #console {
      border-top: 1px solid var(--fg);
      padding: 10px 12px;
      min-height: 138px;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.25;
    }
  </style>
</head>
<body>
  <pre id="screen"></pre>
  <div id="console"></div>

  <script>
    const screen = document.getElementById("screen");
    const consolePanel = document.getElementById("console");

    // Bardziej wertykalna mapa: mniej kolumn, więcej wierszy.
    const COLS = 58;
    const ROWS = 42;

    const keysPressed = new Set();
    const keysHandled = new Set();

    const speedOrders = [
      { name: "STOP", value: 0 },
      { name: "1/3 NAPRZOD", value: 2.5 },
      { name: "2/3 NAPRZOD", value: 5.0 },
      { name: "CALA NAPRZOD", value: 7.5 },
      { name: "FLANKA", value: 10.0 }
    ];

    const ship = {
      x: 29,
      y: 34,
      heading: -Math.PI / 2,
      speed: 0,
      targetSpeedIndex: 0,
      rudder: 0,
      maxRudder: 30,
      acceleration: 1.2
    };

    const uboat = {
      x: 30,
      y: 8,
      detected: false
    };

    const sonar = { range: 12 };

    let lastTime = performance.now();

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      keysPressed.add(key);
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(key)) {
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      keysPressed.delete(key);
      keysHandled.delete(key);
    });

    function wasPressedOnce(key) {
      if (keysPressed.has(key) && !keysHandled.has(key)) {
        keysHandled.add(key);
        return true;
      }
      return false;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function angleToGlyph(angle) {
      const normalized = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const sector = Math.round(normalized / (Math.PI / 4)) % 8;
      return [">", "\\", "v", "/", "<", "\\", "^", "/"][sector];
    }

    function put(grid, x, y, char) {
      const ix = Math.round(x);
      const iy = Math.round(y);
      if (ix >= 0 && ix < COLS && iy >= 0 && iy < ROWS) grid[iy][ix] = char;
    }

    function drawText(grid, x, y, text) {
      for (let i = 0; i < text.length; i++) put(grid, x + i, y, text[i]);
    }

    function updateOrders() {
      if (wasPressedOnce("arrowup") || wasPressedOnce("w")) {
        ship.targetSpeedIndex = clamp(ship.targetSpeedIndex + 1, 0, speedOrders.length - 1);
      }

      if (wasPressedOnce("arrowdown") || wasPressedOnce("s")) {
        ship.targetSpeedIndex = clamp(ship.targetSpeedIndex - 1, 0, speedOrders.length - 1);
      }

      if (wasPressedOnce("arrowleft") || wasPressedOnce("a")) {
        ship.rudder = clamp(ship.rudder - 5, -ship.maxRudder, ship.maxRudder);
      }

      if (wasPressedOnce("arrowright") || wasPressedOnce("d")) {
        ship.rudder = clamp(ship.rudder + 5, -ship.maxRudder, ship.maxRudder);
      }

      if (wasPressedOnce(" ")) ship.rudder = 0;
      if (wasPressedOnce("x")) ship.targetSpeedIndex = 0;
    }

    function updatePhysics(dt) {
      const targetSpeed = speedOrders[ship.targetSpeedIndex].value;

      if (ship.speed < targetSpeed) {
        ship.speed = Math.min(targetSpeed, ship.speed + ship.acceleration * dt);
      } else if (ship.speed > targetSpeed) {
        ship.speed = Math.max(targetSpeed, ship.speed - ship.acceleration * dt);
      }

      // Stały ster daje stały skręt. Im większa prędkość i wychylenie, tym ciaśniejszy zwrot.
      const speedFactor = ship.speed / 10;
      const rudderFactor = ship.rudder / ship.maxRudder;
      const turnRate = rudderFactor * speedFactor * 0.9;
      ship.heading += turnRate * dt;

      // Znakowa mapa jest wyższa niż szersza, więc ruch Y ma inną skalę.
      ship.x += Math.cos(ship.heading) * ship.speed * dt * 1.55;
      ship.y += Math.sin(ship.heading) * ship.speed * dt * 0.78;

      // Zawijanie mapy na krawędziach, jak na dużym stole taktycznym.
      if (ship.x < 2) ship.x = COLS - 3;
      if (ship.x > COLS - 3) ship.x = 2;
      if (ship.y < 2) ship.y = ROWS - 3;
      if (ship.y > ROWS - 3) ship.y = 2;

      uboat.detected = distance(ship, uboat) <= sonar.range;
    }

    function render() {
      const grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => " "));

      for (let x = 0; x < COLS; x++) {
        put(grid, x, 0, "-");
        put(grid, x, ROWS - 1, "-");
      }
      for (let y = 0; y < ROWS; y++) {
        put(grid, 0, y, "|");
        put(grid, COLS - 1, y, "|");
      }
      put(grid, 0, 0, "+"); put(grid, COLS - 1, 0, "+");
      put(grid, 0, ROWS - 1, "+"); put(grid, COLS - 1, ROWS - 1, "+");

      for (let x = 6; x < COLS - 6; x += 10) {
        for (let y = 5; y < ROWS - 4; y += 6) put(grid, x, y, ".");
      }

      drawText(grid, 3, 1, "ATLANTYK / EKRAN TAKTYCZNY ASCII");

      const sx = Math.round(ship.x);
      const sy = Math.round(ship.y);

      // Wektor kierunku przed okrętem.
      const vx1 = ship.x + Math.cos(ship.heading) * 2;
      const vy1 = ship.y + Math.sin(ship.heading) * 1;
      const vx2 = ship.x + Math.cos(ship.heading) * 4;
      const vy2 = ship.y + Math.sin(ship.heading) * 2;
      const vx3 = ship.x + Math.cos(ship.heading) * 6;
      const vy3 = ship.y + Math.sin(ship.heading) * 3;

      put(grid, vx1, vy1, ".");
      put(grid, vx2, vy2, ".");
      put(grid, vx3, vy3, angleToGlyph(ship.heading));

      put(grid, sx, sy, angleToGlyph(ship.heading));
      drawText(grid, sx + 2, sy, "DD");

      if (uboat.detected) {
        put(grid, uboat.x, uboat.y, "U");
        drawText(grid, uboat.x + 2, uboat.y, "KONTAKT");
      } else {
        put(grid, uboat.x, uboat.y, ".");
      }

      const d = distance(ship, uboat);
      drawText(grid, 3, ROWS - 2, `${uboat.detected ? "SONAR: KONTAKT" : "SONAR: CISZA"} / DYSTANS ${Math.round(d)} hm`);

      screen.textContent = grid.map(row => row.join("")).join("\n");

      const order = speedOrders[ship.targetSpeedIndex];
      const headingDeg = (((ship.heading * 180 / Math.PI) % 360) + 360) % 360;
      const rudderSide = ship.rudder < 0 ? "LEWO " : ship.rudder > 0 ? "PRAWO" : "ZERO ";
      const rudderAbs = Math.abs(ship.rudder).toFixed(0).padStart(2);

      consolePanel.textContent =
`KONSOLA STEROWANIA OKRETEM
` +
`------------------------------------------------------------
` +
`ROZKAZ MASZYN: ${order.name.padEnd(13)} | AKTUALNA PREDKOSC: ${ship.speed.toFixed(1).padStart(4)} w.
` +
`STER: ${rudderSide} ${rudderAbs}°            | KURS: ${headingDeg.toFixed(0).padStart(3)}°
` +
`SONAR: ${uboat.detected ? "KONTAKT ZANURZONY" : "BRAK KONTAKTU"}      | ZASIEG: ${sonar.range} hm
` +
`STEROWANIE: W/↑ = zwieksz rozkaz predkosci | S/↓ = zmniejsz rozkaz predkosci
` +
`            A/← = ster 5° w lewo          | D/→ = ster 5° w prawo
` +
`            SPACJA = ster zero            | X = STOP
` +
`TEST: ustaw 1/3 NAPRZOD i STER PRAWO 10°. Okret powinien stale zataczac luk/kolo.`;
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      updateOrders();
      updatePhysics(dt);
      render();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
